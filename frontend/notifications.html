<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/><title>BrinX — Notifications</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <div class="aurora"><div class="ab ab1"></div><div class="ab ab2"></div><div class="ab ab3"></div><div class="ab ab4"></div></div>

  <nav class="navbar z1">
    <div class="navbar-inner">
      <a href="dashboard.html" class="logo-text" style="font-size:26px;text-decoration:none"><span class="logo-brin">Brin</span><span id="logo-x">X</span></a>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Home</a>
        <a href="post-request.html" class="nav-link">Post Request</a>
        <a href="view-requests.html" class="nav-link">View Requests</a>
        <a href="assigned-tasks.html" class="nav-link">My Tasks</a>
      </div>
      <div class="nav-right">
        <a href="profile.html" style="text-decoration:none;text-align:right">
          <div class="nav-user-name" id="user-name">User</div>
          <div class="nav-user-points"><span id="user-points">0</span> pts</div>
        </a>
        <button id="logout-btn" class="btn-danger" style="padding:7px 14px;font-size:12px">Log out</button>
      </div>
    </div>
  </nav>

  <div class="z1" style="max-width:1200px;margin:0 auto;padding:36px 24px">

    <!-- Page Header -->
    <div style="margin-bottom:32px">
      <p style="font-size:13px;color:var(--v-l);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">Updates</p>
      <h2 style="font-size:clamp(26px,3.5vw,38px);font-weight:800;font-family:'Syne',sans-serif;color:var(--tx)">
        <span class="gradient-text">Notifications</span>
      </h2>
      <p style="color:var(--tx2);font-size:15px;margin-top:4px">Stay updated with your tasks and activity</p>
    </div>

    <!-- Notifications inside glass-card panel -->
    <div class="glass-card" style="padding:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px">
        <p style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em">Activity Feed</p>
        <button id="mark-all-read" class="btn-primary" style="padding:8px 16px;font-size:12px">Mark All as Read</button>
      </div>
      <div id="notifications-container" style="display:flex;flex-direction:column;gap:10px">
        <div class="empty-state"><div class="empty-icon"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><h3>Loading...</h3></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/aurora.js"></script>
  <script>
    if (!localStorage.getItem("token")) window.location.href = "login.html";
    const typeLabels   = { task_posted:"Task Posted", task_accepted:"Task Accepted", task_completed:"Task Completed", reward_reminder:"Reward Reminder", reward_confirmed:"Reward Confirmed", urgent_sos:"SOS Urgent", waitlist_open:"Waitlist Open", bid_received:"Bid Received", bid_selected:"Bid Selected", task_auto_bump:"Auto Bump", task_reassigned:"Reassigned", task_team_joined:"Team Joined" };
    const typeVariants = { task_posted:"info", task_accepted:"success", task_completed:"purple", reward_reminder:"warning", reward_confirmed:"success", urgent_sos:"danger", waitlist_open:"warning", bid_received:"info", bid_selected:"success", task_auto_bump:"warning", task_reassigned:"info", task_team_joined:"purple" };

    async function loadNotifications() {
      try {
        const data = await apiCall("/notifications","GET");
        const container = document.getElementById("notifications-container");
        if (!data.notifications.length) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><h3>No notifications yet</h3><p>You'll see task updates here</p></div>`;
          return;
        }
        container.innerHTML = data.notifications.map(n => {
          const label   = typeLabels[n.type]   || "Notification";
          const variant = typeVariants[n.type] || "info";
          const time    = new Date(n.created_at).toLocaleString();
          return `
            <div style="display:flex;align-items:flex-start;gap:14px;padding:16px;border-radius:12px;background:${!n.read?'rgba(124,58,237,.06)':'rgba(15,23,42,.02)'};border:1px solid ${!n.read?'rgba(124,58,237,.2)':'rgba(15,23,42,.06)'};transition:background .2s">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
                  <span class="badge badge-${variant}">${label}</span>
                  ${!n.read?'<span class="badge badge-purple">New</span>':''}
                </div>
                <p style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:5px;line-height:1.45">${n.message}</p>
                <p style="font-size:12px;color:var(--tx3)">${time} &nbsp;·&nbsp; From: ${n.sender_name}</p>
                ${!n.read?`<button onclick="markAsRead('${n._id}')" style="margin-top:10px;font-size:13px;color:var(--v-l);background:none;border:none;cursor:pointer;font-weight:600;padding:0;transition:color .2s">Mark as read</button>`:''}
              </div>
            </div>`;
        }).join("");
        anime({ targets: "#notifications-container > div", translateX: [-20,0], opacity: [0,1], delay: anime.stagger(60), duration: 350, easing: "easeOutExpo" });
      } catch(err) {
        document.getElementById("notifications-container").innerHTML = `<div style="padding:24px;text-align:center"><p style="color:#f87171;font-weight:600;margin-bottom:12px">Failed to load notifications</p><button onclick="loadNotifications()" class="btn-primary" style="padding:9px 18px;font-size:13px">Try Again</button></div>`;
      }
    }

    window.markAsRead = async id => { try { await apiCall(`/notifications/${id}/read`,"PATCH"); loadNotifications(); } catch(e){} };
    document.getElementById("mark-all-read").addEventListener("click", async () => { try { await apiCall("/notifications/mark-all-read","PATCH"); loadNotifications(); } catch(e){ alert("Failed"); } });
    document.getElementById("logout-btn").addEventListener("click", () => { localStorage.clear(); window.location.href = "login.html"; });
    loadNotifications();
    setInterval(loadNotifications, 30000);
  </script>
</body>
</html>
