<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/><title>BrinX — Reset Password</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px; }
      .auth-wrapper { width:100%;max-width:400px; }
    </style>
  </head>
  <body class="bg-dark">
    <div class="auth-wrapper">
      <div style="text-align:center;margin-bottom:28px">
        <a href="login.html" class="logo-text" style="font-size:36px;letter-spacing:-1px;text-decoration:none"><span class="logo-brin">Brin</span><span id="logo-x">X</span></a>
      </div>

      <div class="glass-card" style="padding:36px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px">
          <div style="width:44px;height:44px;border-radius:50%;background:var(--success-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="20" height="20" fill="none" stroke="#059669" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div>
            <h2 style="font-size:20px;font-weight:700;color:var(--text-primary)">Reset Password</h2>
            <p style="color:var(--text-secondary);font-size:13px">Enter your new password below</p>
          </div>
        </div>

        <div id="error-message" class="alert alert-error hidden" style="margin-bottom:16px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-text"></span>
        </div>
        <div id="success-message" class="alert alert-success hidden" style="margin-bottom:16px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="success-text"></span>
        </div>

        <form id="reset-form" style="display:flex;flex-direction:column;gap:16px">
          <div>
            <label class="form-label" for="password">New Password</label>
            <div style="position:relative">
              <input type="password" id="password" class="input-field" placeholder="Minimum 6 characters" style="padding-right:40px" required minlength="6" />
              <button type="button" class="pwd-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:0;display:flex">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div>
            <label class="form-label" for="confirm-password">Confirm New Password</label>
            <div style="position:relative">
              <input type="password" id="confirm-password" class="input-field" placeholder="Re-enter password" style="padding-right:40px" required minlength="6" />
              <button type="button" class="pwd-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:0;display:flex">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" id="submit-btn" class="btn-primary" style="padding:13px;font-size:15px">
            Reset Password
          </button>
        </form>

        <div style="text-align:center;margin-top:20px">
          <a href="login.html" style="color:var(--accent-light);font-size:13px;font-weight:500;text-decoration:none">Back to Login</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      const resetToken = new URLSearchParams(window.location.search).get("token");
      if (!resetToken) window.location.href = "forgot-password.html";

      document.getElementById("reset-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm-password").value;
        if (password !== confirmPassword) { showError("Passwords do not match"); return; }
        const btn = document.getElementById("submit-btn");
        btn.disabled = true; btn.textContent = "Resetting...";
        try {
          const response = await fetch(API_BASE_URL + "/auth/reset-password", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: resetToken, newPassword: password }),
          });
          const data = await response.json();
          if (response.ok) {
            showSuccess("Password reset successfully! Redirecting to login...");
            setTimeout(() => { window.location.href = "login.html"; }, 2000);
          } else {
            showError(data.message || "Failed to reset password");
            btn.disabled = false; btn.textContent = "Reset Password";
          }
        } catch (err) {
          showError("Network error. Please try again.");
          btn.disabled = false; btn.textContent = "Reset Password";
        }
      });
      function showError(msg) { document.getElementById("error-text").textContent = msg; document.getElementById("error-message").classList.remove("hidden"); document.getElementById("success-message").classList.add("hidden"); }
      function showSuccess(msg) { document.getElementById("success-text").textContent = msg; document.getElementById("success-message").classList.remove("hidden"); document.getElementById("error-message").classList.add("hidden"); }

      document.querySelectorAll('.pwd-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
          const p = this.previousElementSibling;
          const t = this.querySelector('svg');
          if (p.type === 'password') {
            p.type = 'text';
            t.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><line x1="1" y1="1" x2="23" y2="23"/>';
          } else {
            p.type = 'password';
            t.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
          }
        });
      });
    </script>
  </body>
</html>
