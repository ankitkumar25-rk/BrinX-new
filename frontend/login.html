<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrinX — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .auth-wrap{width:100%;max-width:420px;position:relative;z-index:1}
  </style>
</head>
<body>
  <!-- Aurora background -->
  <div class="aurora">
    <div class="ab ab1"></div><div class="ab ab2"></div>
    <div class="ab ab3"></div><div class="ab ab4"></div>
  </div>

  <div class="auth-wrap">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:36px">
      <h1 class="logo-text" style="font-size:52px;display:block;line-height:1"><span class="logo-brin">Brin</span><span id="logo-x">X</span></h1>
      <p style="color:var(--tx2);margin-top:10px;font-size:14px">Get your task done — smarter, faster, together.</p>
    </div>

    <!-- Glass Card -->
    <div class="glass-card" style="padding:40px">
      <h2 style="font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px">Welcome back</h2>
      <p style="color:var(--tx2);font-size:14px;margin-bottom:26px">Sign in to your BrinX account</p>

      <div id="error-message" class="alert alert-error hidden" style="margin-bottom:18px">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text"></span>
      </div>

      <form id="login-form" style="display:flex;flex-direction:column;gap:18px">
        <div>
          <label class="form-label" for="identifier">Email or Roll Number</label>
          <input type="text" id="identifier" class="input-field" placeholder="b25cs1002 or b25cs1002@iitj.ac.in" required autocomplete="username"/>
          <p style="font-size:11px;color:var(--tx3);margin-top:5px">You can use either your roll number or IITJ email</p>
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <div style="position:relative">
            <input type="password" id="password" class="input-field" placeholder="Enter your password" style="padding-right:40px" required/>
            <button type="button" class="pwd-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx2);padding:0;display:flex">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn-primary" style="padding:14px;font-size:15px;margin-top:4px">Sign In</button>
        <div style="display:flex;align-items:center;gap:10px;margin:2px 0">
          <div style="flex:1;height:1px;background:var(--b)"></div>
          <span style="color:var(--tx3);font-size:12px">or</span>
          <div style="flex:1;height:1px;background:var(--b)"></div>
        </div>
        <button type="button" id="google-custom-btn" class="btn-secondary" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;font-size:14px;background:rgba(15,23,42,0.03);border:1px solid rgba(15,23,42,0.08);color:var(--tx);border-radius:12px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='rgba(15,23,42,0.06)'" onmouseout="this.style.background='rgba(15,23,42,0.03)'">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>
      </form>

      <div style="text-align:center;margin-top:14px">
        <a href="forgot-password.html" style="color:var(--v-l);font-size:13px;text-decoration:none;font-weight:500">Forgot your password?</a>
      </div>
      <div class="glow-line"></div>
      <p style="text-align:center;color:var(--tx2);font-size:14px">
        Don't have an account?
        <a href="signup.html" style="color:var(--v-xl);font-weight:700;text-decoration:none;margin-left:4px">Create one</a>
      </p>
    </div>

    <p style="text-align:center;color:var(--tx3);font-size:12px;margin-top:20px">Made with care for college students</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/aurora.js"></script>
  <script>
    if (localStorage.getItem("token")) window.location.href = "dashboard.html";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      btn.disabled = true; btn.textContent = "Signing in...";
      try {
        const res = await fetch(API_BASE_URL + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            identifier: document.getElementById("identifier").value.trim(),
            password:   document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user",  JSON.stringify(data.user));
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("error-text").textContent = data.message || "Login failed";
          document.getElementById("error-message").classList.remove("hidden");
          btn.disabled = false; btn.textContent = "Sign In";
        }
      } catch (err) {
        document.getElementById("error-text").textContent = "Network error. Please try again.";
        document.getElementById("error-message").classList.remove("hidden");
        btn.disabled = false; btn.textContent = "Sign In";
      }
    });

    // Google Sign-In setup using OAuth2 Token Client for custom button support
    let googleClient;
    window.onload = function () {
      googleClient = google.accounts.oauth2.initTokenClient({
        client_id: "your_google_client_id.apps.googleusercontent.com", // REPLACE WITH REAL CLIENT ID IN PROD
        scope: "email profile",
        callback: handleGoogleCredential
      });
      document.getElementById("google-custom-btn").addEventListener("click", () => {
        googleClient.requestAccessToken();
      });
    };

    async function handleGoogleCredential(response) {
      if (!response || !response.access_token) return;
      try {
        const res = await fetch(API_BASE_URL + "/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ access_token: response.access_token }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("error-text").textContent = data.message || "Google Login failed";
          document.getElementById("error-message").classList.remove("hidden");
        }
      } catch (err) {
        document.getElementById("error-text").textContent = "Network error with Google Login.";
        document.getElementById("error-message").classList.remove("hidden");
      }
    }

    document.querySelectorAll('.pwd-toggle').forEach(btn => {
      btn.addEventListener('click', function() {
        const p = this.previousElementSibling;
        const t = this.querySelector('svg');
        if (p.type === 'password') {
          p.type = 'text';
          t.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
          p.type = 'password';
          t.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
      });
    });
  </script>
</body>
</html>
