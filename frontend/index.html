<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrinX — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .auth-wrap{width:100%;max-width:420px;position:relative;z-index:1}
  </style>
</head>
<body>
  <!-- Aurora background -->
  <div class="aurora">
    <div class="ab ab1"></div><div class="ab ab2"></div>
    <div class="ab ab3"></div><div class="ab ab4"></div>
  </div>

  <div class="auth-wrap">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:36px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:16px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);margin-bottom:18px;box-shadow:0 0 30px rgba(124,58,237,.3)">
        <svg width="24" height="24" fill="none" stroke="#a78bfa" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <h1 class="logo-text" style="font-size:52px;display:block;line-height:1"><span class="logo-brin">Brin</span><span id="logo-x">X</span></h1>
      <p style="color:var(--tx2);margin-top:10px;font-size:14px">Get your task done — smarter, faster, together.</p>
    </div>

    <!-- Glass Card -->
    <div class="glass-card" style="padding:40px">
      <h2 style="font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px">Welcome back</h2>
      <p style="color:var(--tx2);font-size:14px;margin-bottom:26px">Sign in to your BrinX account</p>

      <div id="error-message" class="alert alert-error hidden" style="margin-bottom:18px">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text"></span>
      </div>

      <form id="login-form" style="display:flex;flex-direction:column;gap:18px">
        <div>
          <label class="form-label" for="identifier">Email or Roll Number</label>
          <input type="text" id="identifier" class="input-field" placeholder="b25cs1002 or b25cs1002@iitj.ac.in" required autocomplete="username"/>
          <p style="font-size:11px;color:var(--tx3);margin-top:5px">You can use either your roll number or IITJ email</p>
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="Enter your password" required/>
        </div>
        <button type="submit" id="login-btn" class="btn-primary" style="padding:14px;font-size:15px;margin-top:4px">Sign In</button>
      </form>

      <div style="text-align:center;margin-top:14px">
        <a href="forgot-password.html" style="color:var(--v-l);font-size:13px;text-decoration:none;font-weight:500">Forgot your password?</a>
      </div>
      <div class="glow-line"></div>
      <p style="text-align:center;color:var(--tx2);font-size:14px">
        Don't have an account?
        <a href="signup.html" style="color:var(--v-xl);font-weight:700;text-decoration:none;margin-left:4px">Create one</a>
      </p>
    </div>

    <p style="text-align:center;color:var(--tx3);font-size:12px;margin-top:20px">Made with care for college students</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/aurora.js"></script>
  <script>
    if (localStorage.getItem("token")) window.location.href = "dashboard.html";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      btn.disabled = true; btn.textContent = "Signing in...";
      try {
        const res = await fetch(API_BASE_URL + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            identifier: document.getElementById("identifier").value.trim(),
            password:   document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user",  JSON.stringify(data.user));
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("error-text").textContent = data.message || "Login failed";
          document.getElementById("error-message").classList.remove("hidden");
          btn.disabled = false; btn.textContent = "Sign In";
        }
      } catch (err) {
        document.getElementById("error-text").textContent = "Network error. Please try again.";
        document.getElementById("error-message").classList.remove("hidden");
        btn.disabled = false; btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
