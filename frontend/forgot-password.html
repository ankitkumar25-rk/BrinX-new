<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/><title>BrinX — Forgot Password</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.w{width:100%;max-width:400px;z-index:1;position:relative}</style>
</head>
<body>
  <div class="aurora"><div class="ab ab1"></div><div class="ab ab2"></div><div class="ab ab3"></div><div class="ab ab4"></div></div>
  <div class="w">
    <div style="text-align:center;margin-bottom:30px">
      <a href="index.html" class="logo-text" style="font-size:40px;text-decoration:none"><span class="logo-brin">Brin</span><span id="logo-x">X</span></a>
    </div>
    <div class="glass-card" style="padding:38px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
        <div style="width:44px;height:44px;border-radius:50%;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 20px rgba(124,58,237,.2)">
          <svg width="18" height="18" fill="none" stroke="#a78bfa" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div>
          <h2 style="font-size:20px;font-weight:700;color:var(--tx)">Forgot Password</h2>
          <p style="color:var(--tx2);font-size:13px">We'll send a reset link to your email</p>
        </div>
      </div>
      <div id="error-message" class="alert alert-error hidden" style="margin-bottom:16px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span id="error-text"></span></div>
      <div id="success-message" class="alert alert-success hidden" style="margin-bottom:16px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span id="success-text"></span></div>
      <form id="forgot-form" style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="your.email@college.edu" required/>
        </div>
        <button type="submit" id="submit-btn" class="btn-primary" style="padding:13px;font-size:15px">Send Reset Link</button>
      </form>
      <div style="text-align:center;margin-top:20px">
        <a href="index.html" style="color:var(--v-l);font-size:13px;font-weight:500;text-decoration:none">Back to Login</a>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/aurora.js"></script>
  <script>
    document.getElementById("forgot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn=document.getElementById("submit-btn"); btn.disabled=true; btn.textContent="Sending...";
      try {
        const res=await fetch(API_BASE_URL+"/auth/forgot-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:document.getElementById("email").value})});
        const data=await res.json();
        if(res.ok){document.getElementById("success-text").textContent="Reset link sent! Check your email inbox.";document.getElementById("success-message").classList.remove("hidden");document.getElementById("error-message").classList.add("hidden");}
        else{document.getElementById("error-text").textContent=data.message||"Failed";document.getElementById("error-message").classList.remove("hidden");document.getElementById("success-message").classList.add("hidden");}
      }catch(err){document.getElementById("error-text").textContent="Network error";document.getElementById("error-message").classList.remove("hidden");}
      finally{btn.disabled=false;btn.textContent="Send Reset Link";}
    });
  </script>
</body>
</html>
